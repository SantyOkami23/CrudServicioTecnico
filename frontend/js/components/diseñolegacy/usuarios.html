<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Sistema de Soporte Técnico</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="container">
    <div class="page-header">
        <h1 class="page-title">👥 Gestión de Usuarios</h1>
        <button class="btn btn-primary" onclick="mostrarModalCrear()">+ Nuevo Usuario</button>
    </div>

    <!-- Filtros -->
    <div class="filters-bar">
        <div class="filter-group">
            <label>Rol</label>
            <select id="filterRol">
                <option value="">Todos</option>
                <option value="cliente">Cliente</option>
                <option value="tecnico">Técnico</option>
                <option value="supervisor">Supervisor</option>
                <option value="administrador">Administrador</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Buscar</label>
            <input type="text" id="filterSearch" placeholder="Nombre o email...">
        </div>
        <button class="btn btn-secondary btn-sm" id="btnFiltrar">🔍 Filtrar</button>
    </div>

    <!-- Tabla -->
    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Foto</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Fecha Registro</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody id="usersTableBody">
            <tr><td colspan="7"><div class="spinner"></div></td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal Crear Usuario -->
<div class="modal-overlay hidden" id="userModal">
    <div class="modal">
        <h2 id="modalTitle">Nuevo Usuario</h2>
        <form id="userForm">
            <input type="hidden" id="userId">
            <div class="form-group">
                <label for="userNombre">Nombre *</label>
                <input type="text" id="userNombre" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="userEmail">Email *</label>
                <input type="email" id="userEmail" class="form-control" required>
            </div>
            <div class="form-group" id="passwordGroup">
                <label for="userPassword">Contraseña *</label>
                <input type="password" id="userPassword" class="form-control" minlength="6">
            </div>
            <div class="form-group">
                <label for="userRol">Rol *</label>
                <select id="userRol" class="form-control" required>
                    <option value="cliente">Cliente</option>
                    <option value="tecnico">Técnico</option>
                    <option value="supervisor">Supervisor</option>
                    <option value="administrador">Administrador</option>
                </select>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
                <button type="submit" class="btn btn-primary">Guardar</button>
            </div>
        </form>
    </div>
</div>

<script src="../js/utils/auth.js"></script>
<script src="../js/utils/errorHandler.js"></script>
<script src="../js/components/navbar.js"></script>
<script src="../js/api/userApi.js"></script>
<script src="../js/api/authApi.js"></script>
<script>
    let currentFilters = {};
    let isEditing = false;

    async function cargarUsuarios() {
      const tbody = document.getElementById('usersTableBody');
      tbody.innerHTML = '<tr><td colspan="7"><div class="spinner"></div></td></tr>';

      try {
        const result = await userApi.getAll(currentFilters);

        if (result.success && result.data.length > 0) {
          tbody.innerHTML = result.data.map(u => `
            <tr>
              <td>#${u.id}</td>
              <td>
                <img src="${u.foto_perfil ? 'http://localhost:3000' + u.foto_perfil : '../assets/default-avatar.png'}"
                     alt="Foto" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">
              </td>
              <td>${u.nombre}</td>
              <td>${u.email}</td>
              <td><span class="badge badge-${u.rol === 'administrador' ? 'critica' : u.rol === 'supervisor' ? 'alta' : u.rol === 'tecnico' ? 'en_proceso' : 'pendiente'}">${u.rol}</span></td>
              <td>${new Date(u.created_at).toLocaleDateString()}</td>
              <td>
                <button class="btn btn-sm btn-warning" onclick="editarUsuario(${u.id}, '${u.nombre}', '${u.email}', '${u.rol}')">Editar</button>
                <button class="btn btn-sm btn-danger" onclick="eliminarUsuario(${u.id}, '${u.nombre}')">Eliminar</button>
              </td>
            </tr>
          `).join('');
        } else {
          tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><p>No se encontraron usuarios</p></div></td></tr>';
        }
      } catch (error) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><p class="text-danger">Error: ${error.message}</p></div></td></tr>`;
      }
    }

    function mostrarModalCrear() {
      isEditing = false;
      document.getElementById('modalTitle').textContent = 'Nuevo Usuario';
      document.getElementById('userId').value = '';
      document.getElementById('userNombre').value = '';
      document.getElementById('userEmail').value = '';
      document.getElementById('userPassword').value = '';
      document.getElementById('userRol').value = 'cliente';
      document.getElementById('passwordGroup').style.display = 'block';
      document.getElementById('userModal').classList.remove('hidden');
    }

    function editarUsuario(id, nombre, email, rol) {
      isEditing = true;
      document.getElementById('modalTitle').textContent = 'Editar Usuario';
      document.getElementById('userId').value = id;
      document.getElementById('userNombre').value = nombre;
      document.getElementById('userEmail').value = email;
      document.getElementById('userPassword').value = '';
      document.getElementById('userRol').value = rol;
      document.getElementById('passwordGroup').style.display = 'none';
      document.getElementById('userEmail').disabled = true;
      document.getElementById('userModal').classList.remove('hidden');
    }

    function cerrarModal() {
      document.getElementById('userModal').classList.add('hidden');
      document.getElementById('userEmail').disabled = false;
    }

    async function eliminarUsuario(id, nombre) {
      if (!confirm(`¿Estás seguro de eliminar al usuario "${nombre}"?`)) return;

      try {
        await userApi.delete(id);
        errorHandler.show('Usuario eliminado exitosamente', 'success');
        cargarUsuarios();
      } catch (error) {
        errorHandler.show(error.message, 'error');
      }
    }

    document.getElementById('userForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const id = document.getElementById('userId').value;
      const nombre = document.getElementById('userNombre').value;
      const email = document.getElementById('userEmail').value;
      const password = document.getElementById('userPassword').value;
      const rol = document.getElementById('userRol').value;

      try {
        if (isEditing) {
          await userApi.update(id, { nombre, rol });
          errorHandler.show('Usuario actualizado exitosamente', 'success');
        } else {
          await authApi.register({ nombre, email, password, rol });
          errorHandler.show('Usuario creado exitosamente', 'success');
        }
        cerrarModal();
        cargarUsuarios();
      } catch (error) {
        errorHandler.show(error.message, 'error');
      }
    });

    document.getElementById('btnFiltrar').addEventListener('click', () => {
      currentFilters = {};
      const rol = document.getElementById('filterRol').value;
      const search = document.getElementById('filterSearch').value;
      if (rol) currentFilters.rol = rol;
      if (search) currentFilters.search = search;
      cargarUsuarios();
    });

    document.addEventListener('DOMContentLoaded', () => {
      if (!auth.requireAuth()) return;
      const rol = auth.getUserRole();
      if (rol !== 'supervisor' && rol !== 'administrador') {
        window.location.href = 'dashboard.html';
        return;
      }
      cargarUsuarios();
    });
</script>
</body>
</html>
