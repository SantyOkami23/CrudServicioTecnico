<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Iniciar Sesión - Sistema de Soporte Técnico</title>
    <!-- Fuente e iconos profesionales -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Tu hoja de estilos original -->
    <link rel="stylesheet" href="../css/main.css">
    <!-- Estilos mejorados específicos para login -->
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient-start: #e0e7ff;
            --bg-gradient-end: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --radius: 16px;
            --transition: 0.2s ease;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body.login-page {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }
        .login-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 2.5rem 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            animation: fadeInUp 0.6s ease-out;
            text-align: center;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-icon {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
            display: block;
        }
        .login-card h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 0.85rem;
            color: #334155;
            margin-bottom: 0.4rem;
        }
        .input-icon-wrapper {
            position: relative;
        }
        .input-icon-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: color var(--transition);
        }
        .form-control {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all var(--transition);
            background: #f8fafc;
            color: var(--text);
            font-family: inherit;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
            background: white;
        }
        .form-control:focus + i,
        .input-icon-wrapper:focus-within i {
            color: var(--primary);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all var(--transition);
            width: 100%;
            letter-spacing: -0.01em;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #4338ca 0%, #6d28d9 100%);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.5);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .text-danger {
            color: #ef4444;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            justify-content: center;
        }
        .credentials-info {
            margin-top: 1.5rem;
            background: #f1f5f9;
            border-radius: 8px;
            padding: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: 1px solid var(--border);
        }
        .credentials-info i {
            color: var(--primary);
        }
        .mt-2 { margin-top: 1rem; }
        .text-center { text-align: center; }
        .text-muted { color: var(--text-muted); }
    </style>
</head>
<body class="login-page">
<div class="login-card">
    <i class="fas fa-headset login-icon"></i>
    <h1>Soporte Técnico</h1>
    <p class="subtitle">Inicia sesión para acceder al sistema</p>

    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email</label>
            <div class="input-icon-wrapper">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" class="form-control" placeholder="tu@email.com" required>
            </div>
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <div class="input-icon-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" class="form-control" placeholder="Tu contraseña" required>
            </div>
        </div>
        <div id="errorMessage" class="text-danger" style="display:none;"></div>
        <button type="submit" class="btn btn-primary">
            <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
        </button>
    </form>

    <div class="credentials-info">
        <i class="fas fa-info-circle"></i>
        <span>Credenciales de prueba: <strong>admin@soporte.com</strong> / <strong>admin123</strong></span>
    </div>
</div>

<script src="../js/utils/auth.js"></script>
<script src="../js/api/authApi.js"></script>
<script>
    // Redirigir si ya está autenticado
    if (auth.isAuthenticated() && !auth.isTokenExpired()) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('errorMessage');

      errorEl.style.display = 'none';

      try {
        const result = await authApi.login(email, password);

        if (result.success) {
          auth.setToken(result.data.token);
          // Guardar datos del usuario
          localStorage.setItem('userName', result.data.user.nombre);
          localStorage.setItem('userRole', result.data.user.rol);
          localStorage.setItem('userPhoto', result.data.user.foto_perfil || '');

          window.location.href = 'dashboard.html';
        } else {
          errorEl.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${result.message || 'Error al iniciar sesión'}`;
          errorEl.style.display = 'flex';
        }
      } catch (error) {
        errorEl.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${error.message || 'Error de conexión. Verifica que el servidor esté corriendo.'}`;
        errorEl.style.display = 'flex';
      }
    });
</script>
</body>
</html>
