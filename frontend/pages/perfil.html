<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../js/config.js"></script>
    <script src="../js/config.js"></script>
    <title>Mi Perfil - Sistema de Soporte Técnico</title>
    <!-- Fuente e iconos profesionales -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Tu hoja de estilos original -->
    <link rel="stylesheet" href="../css/main.css">
    <!-- Mejoras de diseño -->
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius: 12px;
            --transition: 0.2s ease;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            width: 100%;
            flex: 1;
            animation: fadeInUp 0.5s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cabecera */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            padding: 1.5rem 2rem;
            border-radius: var(--radius);
            color: white;
            box-shadow: var(--shadow-lg);
        }
        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            letter-spacing: -0.025em;
        }
        .page-title i {
            font-size: 1.8rem;
            opacity: 0.9;
        }

        /* Tarjeta de perfil */
        .form-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 2.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
            max-width: 500px;
            margin: 0 auto;
        }
        .profile-photo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 1rem;
        }
        #profilePhoto {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary);
            box-shadow: 0 0 0 6px rgba(79, 70, 229, 0.1);
            transition: all var(--transition);
        }
        #profilePhoto:hover {
            box-shadow: 0 0 0 6px rgba(79, 70, 229, 0.2);
        }
        .profile-info h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.25rem;
        }
        .profile-info p {
            margin-bottom: 0.25rem;
            color: var(--text-muted);
        }
        .badge {
            display: inline-block;
            padding: 0.35em 1em;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            text-transform: capitalize;
            margin-top: 0.5rem;
        }
        /* Badges de rol (coinciden con las clases que asigna el script) */
        .badge-critica { background: #fee2e2; color: #991b1b; } /* admin */
        .badge-alta { background: #fef3c7; color: #92400e; }   /* supervisor */
        .badge-en_proceso { background: #dbeafe; color: #1e40af; } /* otros roles */

        /* Formulario de subida */
        .upload-section {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            text-align: left;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 0.85rem;
            color: #334155;
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .form-control {
            width: 100%;
            padding: 0.65rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            transition: all var(--transition);
            background: #f8fafc;
            color: var(--text);
            font-family: inherit;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
            background: white;
        }
        .text-muted {
            color: var(--text-muted);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin-top: 0.25rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all var(--transition);
            width: 100%;
            letter-spacing: -0.01em;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #4338ca 0%, #6d28d9 100%);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.5);
        }
        .btn-primary:active {
            transform: translateY(0);
        }

        /* Spinner y estados */
        .spinner {
            display: inline-block;
            width: 1.2rem;
            height: 1.2rem;
            border: 2px solid var(--border);
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #uploadStatus {
            margin-top: 0.75rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }
        .text-success {
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .text-danger {
            color: #ef4444;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .form-card {
                padding: 1.5rem;
            }
            #profilePhoto {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <h1 class="page-title"><i class="fas fa-user-circle"></i> Mi Perfil</h1>
    </div>

    <div class="form-card">
        <!-- Foto de perfil -->
        <div class="profile-photo-wrapper">
            <img id="profilePhoto" src="../assets/default-avatar.png"
                 alt="Foto de perfil">
        </div>

        <!-- Información del usuario -->
        <div class="profile-info">
            <h2 id="profileName">Cargando...</h2>
            <p id="profileEmail" class="text-muted" style="justify-content:center;"></p>
            <p><span class="badge" id="profileRole"></span></p>
        </div>

        <!-- Sección de carga de foto -->
        <div class="upload-section">
            <div class="form-group">
                <label for="photoInput"><i class="fas fa-camera"></i> Cambiar foto de perfil</label>
                <input type="file" id="photoInput" accept="image/jpeg,image/jpg,image/png" class="form-control">
                <small class="text-muted"><i class="fas fa-info-circle"></i> Formatos: JPG, PNG. Máximo 5 MB</small>
            </div>
            <button class="btn btn-primary" id="btnUploadPhoto">
                <i class="fas fa-sync-alt"></i> Actualizar Foto
            </button>
            <div id="uploadStatus" class="text-center mt-1"></div>
        </div>
    </div>
</div>

<script src="../js/utils/auth.js"></script>
<script src="../js/utils/errorHandler.js"></script>
<script src="../js/components/navbar.js"></script>
<script src="../js/api/userApi.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!auth.requireAuth()) return;

      const userId = auth.getUserId();
      const userEmail = auth.getUserEmail();

      document.getElementById('profileEmail').textContent = userEmail;

      try {
        const result = await userApi.getById(userId);
        if (result.success) {
          const user = result.data;
          document.getElementById('profileName').textContent = user.nombre;
          document.getElementById('profileRole').textContent = user.rol;
          document.getElementById('profileRole').className = `badge badge-${user.rol === 'administrador' ? 'critica' : user.rol === 'supervisor' ? 'alta' : 'en_proceso'}`;

          if (user.foto_perfil) {
            document.getElementById('profilePhoto').src = `http://localhost:3000${user.foto_perfil}`;
          }
        }
      } catch (error) {
        errorHandler.show(error.message, 'error');
      }

      document.getElementById('btnUploadPhoto').addEventListener('click', async () => {
        const fileInput = document.getElementById('photoInput');
        const file = fileInput.files[0];

        if (!file) {
          errorHandler.show('Selecciona una imagen primero.', 'warning');
          return;
        }

        if (file.size > 5 * 1024 * 1024) {
          errorHandler.show('La imagen no debe superar 5 MB.', 'error');
          return;
        }

        const allowedTypes = ['image/jpeg', 'image/jpg', 'image/png'];
        if (!allowedTypes.includes(file.type)) {
          errorHandler.show('Solo se permiten imágenes JPG y PNG.', 'error');
          return;
        }

        try {
          document.getElementById('uploadStatus').innerHTML = '<div class="spinner"></div>';
          const result = await userApi.uploadPhoto(userId, file);

          if (result.success) {
            document.getElementById('profilePhoto').src = `http://localhost:3000${result.data.foto_perfil}?t=${Date.now()}`;
            document.getElementById('uploadStatus').innerHTML = '<span class="text-success"><i class="fas fa-check-circle"></i> Foto actualizada</span>';
            errorHandler.show('Foto de perfil actualizada exitosamente', 'success');
          }
        } catch (error) {
          document.getElementById('uploadStatus').innerHTML = `<span class="text-danger"><i class="fas fa-exclamation-circle"></i> Error: ${error.message}</span>`;
          errorHandler.show(error.message, 'error');
        }
      });
    });
</script>
</body>
</html>
